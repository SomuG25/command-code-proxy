use_default_settings: true

search:
  formats:
    - html
    - json

server:
  secret_key: "change-me-to-a-random-string"
  bind_address: "0.0.0.0:8080"

engines:
  - name: google
    engine: google
    shortcut: g

  - name: bing
    engine: bing
    shortcut: b

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
